<script>
    function everyposts() {
        const posts = [{"category": "Slacker in Another World", "content": "---\ntitle: Kok Aku!?\ntimestamp: 24-06-2026\n---\n\u0026emsp;Tidak bisa aku bayangkan bahwa aku kembali lagi ke sini.\n\u0026emsp;Tidak, ma...", "fulllinkcomparison": "C:/Users/effen/Documents/Projects/Script/Github Blog/myblog/markdowns/Slacker in Another World/Chapter 1.md", "link": "Chapter 1", "title": "Chapter 1.md"}, {"category": "miscellaneous", "content": "---\ntitle: Try\ntimestamp: 26-06-2026\n---\nLol...", "fulllinkcomparison": "C:/Users/effen/Documents/Projects/Script/Github Blog/myblog/markdowns/miscellaneous/try.md", "link": "try", "title": "try.md"}];
        console.log(posts)
        for(let i = 0; i<posts.length; i++) {
            const nplelement = document.getElementById("newestpostslist");
            
            const blockinside = document.createElement("div");
            blockinside.classList.add("blockinside");

            const posttitle = document.createElement("h4");
            posttitle.textContent = posts[i]["title"];

            const previewandlink = document.createElement("div");

            const preview = document.createElement("p");
            preview.textContent = posts[i]["content"];

            const link = document.createElement("a");
            const story = encodeURIComponent(posts[i]['category']);
            const chapter = encodeURIComponent(posts[i]['link']);
            link.setAttribute("href", `/shelf/${story}/${chapter}.html`);
            link.textContent = "read more >>>";

            /* add preview and link to previewandlink */
            previewandlink.appendChild(preview);
            previewandlink.appendChild(link);

            /* add previewandlink and posttitle to blockinside and then to newestpostslist */
            blockinside.appendChild(posttitle);
            blockinside.appendChild(previewandlink);

            nplelement.appendChild(blockinside);
        }
    }
    window.onload = function() {
        everyposts();
    }
</script>
